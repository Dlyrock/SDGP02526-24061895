{% extends "base.html" %}
{% block title %}Register Tenant{% endblock %}
{% block content %}
<div class="container py-3" style="max-width:600px;">
  <h2 class="fw-bold mb-4">Register New Tenant</h2>
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Register Tenant</button>
          <a href="{% url 'frontdesk_panel' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
